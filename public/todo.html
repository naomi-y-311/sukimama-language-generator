<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>やりたい曲リスト</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,500,0,0">
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="/todo.css">
  </head>
  <body>
    <main class="single-page">
      <header class="topbar">
        <div>
          <p class="eyebrow">Checklist</p>
          <h1>やりたい曲リスト</h1>
        </div>
        <a class="ghost nav-button" href="/">
          <span class="material-symbols-rounded" aria-hidden="true">open_in_new</span>
          下書き作成へ
        </a>
      </header>

      <div class="todo-page-grid">
        <section class="panel todo-panel" aria-labelledby="todoTitle">
          <div class="panel-title">
            <h2 id="todoTitle">曲を追加</h2>
            <p>アーティスト名と曲名だけでも追加できます。</p>
          </div>

          <form id="todoForm" class="todo-form">
            <input type="hidden" name="todoId">
            <div class="grid two">
              <label>アーティスト名
                <input name="todoArtist" required placeholder="NewJeans">
              </label>
              <label>曲名
                <input name="todoSongTitle" required placeholder="Ditto">
              </label>
              <label>アーティスト日本語表記
                <input name="todoArtistJa" placeholder="ニュージーンズ">
              </label>
              <label>英題・別タイトル
                <input name="todoAltTitle" placeholder="別タイトル">
              </label>
              <label>アルバム名
                <input name="todoAlbum" placeholder="アルバム名">
              </label>
              <label>作詞
                <input name="todoLyricist" placeholder="作詞者名">
              </label>
            </div>
            <label>メモ
              <textarea class="compact-textarea" name="todoMemo" placeholder="気になる点、収録情報、あとで調べることなど"></textarea>
            </label>
            <div class="todo-actions">
              <button class="primary" id="todoSaveButton" type="submit">リストに追加</button>
              <button class="ghost" id="todoCancelButton" type="button" hidden>編集をやめる</button>
            </div>
          </form>
        </section>

        <section class="panel todo-list-panel" aria-labelledby="todoListTitle">
          <div class="panel-title">
            <h2 id="todoListTitle">リスト</h2>
          </div>
          <div class="todo-list" id="todoList" aria-live="polite"></div>
        </section>
      </div>
    </main>
    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="/todo.js" type="module"></script>
  </body>
</html>
